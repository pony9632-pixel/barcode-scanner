<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>條碼讀取器（僅10碼）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; color: #e2e8f0; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; }

    .scanner-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #video {
      width: 100%;
      display: block;
      background: #000;
      min-height: 200px;
    }

    .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
    .scan-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 85%; height: 100px;
      border: 2px solid rgba(99, 230, 190, 0.8);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #63e6be, transparent);
      animation: scanMove 1.8s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 4px; opacity: 1; }
      48%  { top: calc(100% - 4px); opacity: 1; }
      50%  { opacity: 0; }
      52%  { top: 4px; opacity: 0; }
      54%  { opacity: 1; }
      100% { top: calc(100% - 4px); opacity: 1; }
    }
    .corner { position: absolute; width: 16px; height: 16px; border-color: #63e6be; border-style: solid; }
    .corner.tl { top:-1px; left:-1px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .corner.tr { top:-1px; right:-1px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .corner.bl { bottom:-1px; left:-1px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .corner.br { bottom:-1px; right:-1px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

    .status-bar {
      width: 100%; max-width: 480px;
      margin-top: 16px; padding: 12px 16px;
      background: #1e293b; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.88rem;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #475569; flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.scanning { background: #63e6be; animation: pulse 1.2s infinite; }
    .status-dot.found    { background: #4ade80; }
    .status-dot.rejected { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    #status-text { color: #cbd5e1; }

    .result-card {
      width: 100%; max-width: 480px;
      margin-top: 16px; padding: 18px 20px;
      background: #1e293b; border-radius: 16px;
      border-left: 4px solid #475569;
      transition: border-color 0.3s;
    }
    .result-card.success  { border-color: #4ade80; cursor: pointer; }
    .result-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 6px; }
    #result-value { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.12em; color: #f1f5f9; word-break: break-all; min-height: 2.2rem; }
    #result-meta  { margin-top: 6px; font-size: 0.8rem; color: #64748b; }

    .rejected-list { width: 100%; max-width: 480px; margin-top: 16px; }
    .rejected-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; margin-bottom: 8px; }
    #rejected-items { display: flex; flex-wrap: wrap; gap: 6px; }
    .rejected-tag { padding: 4px 10px; background: #1e293b; border: 1px solid #334155; border-radius: 20px; font-size: 0.78rem; color: #94a3b8; }

    .btn-row { display: flex; gap: 10px; margin-top: 16px; width: 100%; max-width: 480px; }
    button { flex:1; padding:12px; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-start { background: #63e6be; color: #0f172a; }
    #btn-stop  { background: #f87171; color: #0f172a; display: none; }
    #btn-clear { background: #334155; color: #e2e8f0; }

    #copy-hint { font-size: 0.78rem; color: #4ade80; text-align: center; height: 1em; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }
  </style>
</head>
<body>

<h1>條碼讀取器 <span style="font-size:0.7rem;color:#63e6be;font-weight:500;vertical-align:middle;">v1</span></h1>
<p class="subtitle">只接受 10 碼條碼</p>

<div class="scanner-wrap">
  <video id="video" autoplay muted playsinline></video>
  <div class="scan-overlay">
    <div class="scan-box">
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">按下「開始掃描」以啟動相機</span>
</div>

<div class="result-card" id="result-card">
  <div class="result-label">掃描結果（10碼）</div>
  <div id="result-value">—</div>
  <div id="result-meta"></div>
</div>
<div id="copy-hint">已複製到剪貼簿！</div>

<div class="rejected-list">
  <div class="rejected-header">略過的條碼（非10碼）</div>
  <div id="rejected-items"></div>
</div>

<div class="btn-row">
  <button id="btn-start">開始掃描</button>
  <button id="btn-stop">停止掃描</button>
  <button id="btn-clear">清除結果</button>
</div>

<script type="module">
  import {
    BrowserMultiFormatReader
  } from 'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm';
  import {
    DecodeHintType,
    BarcodeFormat
  } from 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/+esm';

  const video       = document.getElementById('video');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const resultCard  = document.getElementById('result-card');
  const resultValue = document.getElementById('result-value');
  const resultMeta  = document.getElementById('result-meta');
  const rejectedDiv = document.getElementById('rejected-items');
  const copyHint    = document.getElementById('copy-hint');
  const btnStart    = document.getElementById('btn-start');
  const btnStop     = document.getElementById('btn-stop');
  const btnClear    = document.getElementById('btn-clear');

  const TARGET_LENGTH = 10;
  let codeReader  = null;
  let controls    = null;
  let running     = false;
  let lastFound   = '';
  let cooldown    = false;
  const rejectedSet = new Set();

  // 只啟用線性條碼 + QR（iPhone 17 Pro 盒裝序號是 Code 128）
  const hints = new Map();
  hints.set(DecodeHintType.POSSIBLE_FORMATS, [
    BarcodeFormat.CODE_128,
    BarcodeFormat.CODE_39,
    BarcodeFormat.CODE_93,
    BarcodeFormat.EAN_13,
    BarcodeFormat.EAN_8,
    BarcodeFormat.UPC_A,
    BarcodeFormat.UPC_E,
    BarcodeFormat.ITF,
    BarcodeFormat.CODABAR,
    BarcodeFormat.QR_CODE,
    BarcodeFormat.DATA_MATRIX
  ]);
  hints.set(DecodeHintType.TRY_HARDER, true);

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    statusText.textContent = text;
  }

  function showResult(code, format) {
    resultValue.textContent = code;
    resultMeta.textContent  = `格式：${format}　長度：${code.length} 碼`;
    resultCard.className = 'result-card success';
    resultCard.onclick = () => {
      navigator.clipboard.writeText(code).then(() => {
        copyHint.style.opacity = '1';
        setTimeout(() => copyHint.style.opacity = '0', 1800);
      });
    };
  }

  function addRejected(code) {
    if (rejectedSet.has(code)) return;
    rejectedSet.add(code);
    const tag = document.createElement('span');
    tag.className = 'rejected-tag';
    tag.textContent = `${code} (${code.length}碼)`;
    rejectedDiv.prepend(tag);
  }

  function handleCode(code, format) {
    if (cooldown && code === lastFound) return;

    if (code.length === TARGET_LENGTH) {
      if (code !== lastFound) {
        lastFound = code;
        showResult(code, format);
        setStatus('found', '找到 10 碼條碼！點擊結果可複製');
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        cooldown = true;
        setTimeout(() => { cooldown = false; }, 2500);
      }
    } else {
      addRejected(code);
      setStatus('rejected', `略過：「${code}」共 ${code.length} 碼`);
      setTimeout(() => { if (running) setStatus('scanning', '掃描中，將鏡頭對準條碼…'); }, 1200);
    }
  }

  async function startScanner() {
    if (running) return;
    btnStart.disabled = true;
    setStatus('scanning', '正在請求相機權限…');

    codeReader = new BrowserMultiFormatReader(hints, {
      delayBetweenScanAttempts: 100,
      delayBetweenScanSuccess: 800
    });

    try {
      controls = await codeReader.decodeFromConstraints(
        { video: { facingMode: { ideal: 'environment' } } },
        video,
        (result, err) => {
          if (result) {
            const text   = result.getText().trim();
            const fmtId  = result.getBarcodeFormat();
            const fmtStr = BarcodeFormat[fmtId] || String(fmtId);
            handleCode(text, fmtStr);
          }
          // err 多半是「這一幀沒讀到」，故意忽略
        }
      );
    } catch (e) {
      codeReader = null;
      btnStart.disabled = false;
      if (e && e.name === 'NotAllowedError') {
        setStatus('', '相機權限被拒絕，請到 Safari 設定中允許相機');
      } else {
        setStatus('', `無法開啟相機：${(e && e.message) || e}`);
      }
      return;
    }

    running = true;
    btnStart.style.display = 'none';
    btnStop.style.display  = '';
    setStatus('scanning', '掃描中，將鏡頭對準條碼…');
  }

  async function stopScanner() {
    running = false;
    if (controls) { try { controls.stop(); } catch (_) {} controls = null; }
    codeReader = null;
    video.srcObject = null;
    btnStop.style.display  = 'none';
    btnStart.style.display = '';
    btnStart.disabled = false;
    setStatus('', '已停止掃描');
  }

  function clearAll() {
    resultValue.textContent = '—';
    resultMeta.textContent  = '';
    resultCard.className = 'result-card';
    resultCard.onclick = null;
    rejectedDiv.innerHTML = '';
    rejectedSet.clear();
    lastFound = '';
    cooldown = false;
    if (running) setStatus('scanning', '掃描中，將鏡頭對準條碼…');
  }

  btnStart.addEventListener('click', startScanner);
  btnStop.addEventListener('click', stopScanner);
  btnClear.addEventListener('click', clearAll);
</script>
</body>
</html>
