<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>STUDIO A 條碼掃描</title>

  <!-- PWA + iOS Web App -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="STUDIO A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; color: #e2e8f0; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; }

    .scanner-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4 / 3;
      max-height: 50vh;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: cover;
    }

    .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
    .scan-box {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 85%; height: 100px;
      border: 2px solid rgba(99, 230, 190, 0.8);
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #63e6be, transparent);
      animation: scanMove 1.8s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 4px; opacity: 1; }
      48%  { top: calc(100% - 4px); opacity: 1; }
      50%  { opacity: 0; }
      52%  { top: 4px; opacity: 0; }
      54%  { opacity: 1; }
      100% { top: calc(100% - 4px); opacity: 1; }
    }
    .corner { position: absolute; width: 16px; height: 16px; border-color: #63e6be; border-style: solid; }
    .corner.tl { top:-1px; left:-1px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .corner.tr { top:-1px; right:-1px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .corner.bl { bottom:-1px; left:-1px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .corner.br { bottom:-1px; right:-1px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }

    .status-bar {
      width: 100%; max-width: 480px;
      margin-top: 16px; padding: 12px 16px;
      background: #1e293b; border-radius: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.88rem;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #475569; flex-shrink: 0; transition: background 0.3s;
    }
    .status-dot.scanning { background: #63e6be; animation: pulse 1.2s infinite; }
    .status-dot.found    { background: #4ade80; }
    .status-dot.rejected { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    #status-text { color: #cbd5e1; }

    .result-card {
      width: 100%; max-width: 480px;
      margin-top: 16px; padding: 18px 20px;
      background: #1e293b; border-radius: 16px;
      border-left: 4px solid #475569;
      transition: border-color 0.3s;
    }
    .result-card.success  { border-color: #4ade80; cursor: pointer; }
    .result-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 6px; }
    #result-value { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.12em; color: #f1f5f9; word-break: break-all; min-height: 2.2rem; }

    .history { width: 100%; max-width: 480px; margin-top: 16px; }
    .history[hidden] { display: none; }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #475569; margin-bottom: 8px;
    }
    .history-clear {
      background: none; border: none; color: #64748b; font-size: 0.75rem;
      cursor: pointer; padding: 2px 8px; border-radius: 6px;
    }
    .history-clear:hover { color: #cbd5e1; background: #1e293b; }
    .history-items { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      padding: 10px 14px; background: #1e293b; border-radius: 10px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: background 0.15s;
    }
    .history-item:hover, .history-item:active { background: #243044; }
    .history-item.flash { background: #14532d; transition: background 0.3s; }
    .history-code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-weight: 600; letter-spacing: 0.08em; color: #f1f5f9;
    }
    .history-time { font-size: 0.78rem; color: #64748b; }

    .rejected-list { width: 100%; max-width: 480px; margin-top: 16px; }
    .rejected-list[hidden] { display: none; }
    .rejected-header {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: #475569; margin-bottom: 8px;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 6px;
    }
    .rejected-header::before { content: '▸'; transition: transform 0.2s; font-size: 0.9rem; }
    .rejected-list.open .rejected-header::before { transform: rotate(90deg); }
    #rejected-items { display: none; flex-wrap: wrap; gap: 6px; }
    .rejected-list.open #rejected-items { display: flex; }
    .rejected-tag { padding: 4px 10px; background: #1e293b; border: 1px solid #334155; border-radius: 20px; font-size: 0.78rem; color: #94a3b8; }

    .btn-row { display: flex; gap: 10px; margin-top: 16px; width: 100%; max-width: 480px; }
    button { flex:1; padding:12px; border:none; border-radius:10px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #btn-start { background: #63e6be; color: #0f172a; }
    #btn-stop  { background: #f87171; color: #0f172a; }
    #btn-clear { background: #334155; color: #e2e8f0; }

    .link-row { display: flex; gap: 10px; margin-top: 10px; width: 100%; max-width: 480px; }
    .link-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      background: #38bdf8;
      color: #0f172a;
      transition: opacity 0.2s;
    }
    .link-btn:hover { opacity: 0.85; }
    .link-btn-app { background: #a78bfa; }

    #copy-hint { font-size: 0.78rem; color: #4ade80; text-align: center; height: 1em; margin-top: 8px; opacity: 0; transition: opacity 0.3s; }
  </style>
</head>
<body>

<h1>STUDIO A 條碼掃描 <span style="font-size:0.7rem;color:#63e6be;font-weight:500;vertical-align:middle;">v15</span></h1>
<p class="subtitle">只接受 10 碼條碼</p>

<div class="scanner-wrap">
  <video id="video" autoplay muted playsinline></video>
  <div class="scan-overlay">
    <div class="scan-box">
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">按下「開始掃描」以啟動相機</span>
</div>

<div class="result-card" id="result-card">
  <div class="result-label">掃描結果（10碼）</div>
  <div id="result-value">—</div>
</div>
<div id="copy-hint">已複製序號！</div>

<div class="history" id="history" hidden>
  <div class="history-header">
    <span>掃描歷史 <span id="history-count">(0)</span></span>
    <button class="history-clear" id="btn-clear-history">清空</button>
  </div>
  <div class="history-items" id="history-items"></div>
</div>

<div class="rejected-list" id="rejected-list" hidden>
  <div class="rejected-header" id="rejected-header">略過的條碼 <span id="rejected-count">(0)</span></div>
  <div id="rejected-items"></div>
</div>

<div class="btn-row">
  <button id="btn-start">開始掃描</button>
  <button id="btn-stop" style="display:none">停止掃描</button>
  <button id="btn-clear">清除結果</button>
</div>

<div class="link-row">
  <a class="link-btn" href="https://b2b.skinsurance.com.tw/SKERP/ISNEControl/FrameControl.aspx?_LP=https%3A%2F%2Fb2b.skinsurance.com.tw%2FSKERP%2FB2BWeb%2FB2B%2FlogonB2B.aspx%3FReturnUrl%3D%252fSKERP%252f" target="_blank" rel="noopener">開啟新光 B2B</a>
  <a class="link-btn link-btn-app" href="form://">開啟行銷與表單</a>
</div>

<script type="module">
  import {
    BrowserMultiFormatReader
  } from 'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm';
  import {
    DecodeHintType,
    BarcodeFormat
  } from 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/+esm';

  const video       = document.getElementById('video');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const resultCard  = document.getElementById('result-card');
  const resultValue = document.getElementById('result-value');
  const rejectedDiv = document.getElementById('rejected-items');
  const rejectedList   = document.getElementById('rejected-list');
  const rejectedHeader = document.getElementById('rejected-header');
  const rejectedCount  = document.getElementById('rejected-count');
  const historyEl      = document.getElementById('history');
  const historyItems   = document.getElementById('history-items');
  const historyCount   = document.getElementById('history-count');
  const btnClearHistory = document.getElementById('btn-clear-history');
  const copyHint    = document.getElementById('copy-hint');
  const btnStart    = document.getElementById('btn-start');
  const btnStop     = document.getElementById('btn-stop');
  const btnClear    = document.getElementById('btn-clear');

  const TARGET_LENGTH = 10;
  let codeReader  = null;
  let controls    = null;
  let running     = false;
  let lastFound   = '';
  let cooldown    = false;
  const rejectedSet = new Set();

  // iPhone 盒裝序號是 Code 128。只啟用 Code 128 大幅降低偽讀率
  const hints = new Map();
  hints.set(DecodeHintType.POSSIBLE_FORMATS, [BarcodeFormat.CODE_128]);
  hints.set(DecodeHintType.TRY_HARDER, true);

  // Apple 盒裝 (S) 序號條碼會在前面多一個 S(GS1-128 AI)。
  // 因此接受兩種:純 10 碼,或 S + 10 碼(剝掉 S)。
  function normalizeSerial(raw) {
    if (/^[A-Z0-9]{10}$/.test(raw)) return raw;
    if (/^S[A-Z0-9]{10}$/.test(raw)) return raw.slice(1);
    return null;
  }
  // 略過清單只顯示「接近正確」的字串，亂碼直接丟棄
  const REJECT_VISIBLE_RE = /^[A-Za-z0-9]{6,16}$/;
  // 同一個 code 連續讀到幾次才採信。v4:S + 10 碼大寫英數本身已極嚴格,改成 1 即時接受
  const CONFIRM_COUNT = 1;
  let pendingCode  = '';
  let pendingHits  = 0;

  function setStatus(state, text) {
    statusDot.className = 'status-dot' + (state ? ' ' + state : '');
    statusText.textContent = text;
  }

  function showResult(code) {
    resultValue.textContent = code;
    resultCard.className = 'result-card success';
    resultCard.onclick = () => {
      navigator.clipboard.writeText(code).then(() => {
        copyHint.style.opacity = '1';
        setTimeout(() => copyHint.style.opacity = '0', 1800);
      });
    };
  }

  function addRejected(code) {
    if (rejectedSet.has(code)) return;
    rejectedSet.add(code);
    const tag = document.createElement('span');
    tag.className = 'rejected-tag';
    tag.textContent = `${code} (${code.length}碼)`;
    rejectedDiv.prepend(tag);
    rejectedList.hidden = false;
    rejectedCount.textContent = `(${rejectedSet.size})`;
  }

  // ---- 掃描歷史 (localStorage) ----
  const HISTORY_KEY = 'studioa-barcode-history';
  const HISTORY_MAX = 20;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch (_) { return []; }
  }
  function saveHistory(arr) {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr)); } catch (_) {}
  }
  function addHistory(code) {
    const list = loadHistory().filter(it => it.code !== code);
    list.unshift({ code, t: Date.now() });
    saveHistory(list.slice(0, HISTORY_MAX));
    renderHistory();
  }
  function clearHistory() {
    saveHistory([]);
    renderHistory();
  }
  function relativeTime(t) {
    const sec = Math.floor((Date.now() - t) / 1000);
    if (sec < 60)    return '剛剛';
    if (sec < 3600)  return Math.floor(sec / 60) + ' 分前';
    if (sec < 86400) return Math.floor(sec / 3600) + ' 小時前';
    return Math.floor(sec / 86400) + ' 天前';
  }
  function renderHistory() {
    const list = loadHistory();
    historyCount.textContent = `(${list.length})`;
    historyEl.hidden = list.length === 0;
    historyItems.innerHTML = '';
    list.forEach(item => {
      const row = document.createElement('div');
      row.className = 'history-item';
      const codeSpan = document.createElement('span');
      codeSpan.className = 'history-code';
      codeSpan.textContent = item.code;
      const timeSpan = document.createElement('span');
      timeSpan.className = 'history-time';
      timeSpan.textContent = relativeTime(item.t);
      row.appendChild(codeSpan);
      row.appendChild(timeSpan);
      row.addEventListener('click', () => {
        if (!navigator.clipboard || !navigator.clipboard.writeText) return;
        navigator.clipboard.writeText(item.code).then(() => {
          row.classList.add('flash');
          setTimeout(() => row.classList.remove('flash'), 400);
          copyHint.style.opacity = '1';
          setTimeout(() => copyHint.style.opacity = '0', 1500);
        }).catch(() => {});
      });
      historyItems.appendChild(row);
    });
  }

  function handleCode(raw) {
    if (!running) return; // 已停止,忽略晚到的 callback
    const code = normalizeSerial(raw);

    if (code) {
      // 連續讀到同一個值 CONFIRM_COUNT 次才採信，避免單幀偽讀
      if (code === pendingCode) {
        pendingHits++;
      } else {
        pendingCode = code;
        pendingHits = 1;
      }
      if (pendingHits < CONFIRM_COUNT) return;

      lastFound = code;
      showResult(code);
      addHistory(code);
      if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
      // 找到即停止相機,節省電力 & 避免重複觸發
      stopScanner();
      // 自動複製到剪貼簿。iOS Safari 在非手勢情境可能會拒絕,失敗就退回手動模式
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(() => {
          setStatus('found', `已複製序號：${code}`);
          copyHint.style.opacity = '1';
          setTimeout(() => copyHint.style.opacity = '0', 1800);
        }).catch(() => {
          setStatus('found', '找到序號！相機已關閉，點擊結果可複製');
        });
      } else {
        setStatus('found', '找到序號！相機已關閉，點擊結果可複製');
      }
      return;
    }

    // 不符合接受規則：重置 pending，並有條件地加入略過清單
    pendingCode = '';
    pendingHits = 0;
    if (REJECT_VISIBLE_RE.test(raw)) {
      addRejected(raw);
      setStatus('rejected', `略過：「${raw}」共 ${raw.length} 碼`);
      setTimeout(() => { if (running) setStatus('scanning', '掃描中，將鏡頭對準條碼…'); }, 1200);
    }
    // 含特殊字元/亂碼：靜默丟棄
  }

  async function startScanner(silent = false) {
    if (running) return;
    btnStart.disabled = true;
    if (!silent) setStatus('scanning', '正在請求相機權限…');

    codeReader = new BrowserMultiFormatReader(hints, {
      delayBetweenScanAttempts: 50,
      delayBetweenScanSuccess: 400
    });

    // 高解析度 + 連續自動對焦,讓條碼線條更銳利、更不容易模糊
    const videoConstraints = {
      facingMode: { ideal: 'environment' },
      width:      { ideal: 1920 },
      height:     { ideal: 1080 },
      frameRate:  { ideal: 30 },
      focusMode:  'continuous'
    };

    try {
      controls = await codeReader.decodeFromConstraints(
        { video: videoConstraints },
        video,
        (result, err) => {
          if (result) {
            handleCode(result.getText().trim());
          }
          // err 多半是「這一幀沒讀到」，故意忽略
        }
      );

      // 啟動後再對 track 套用 advanced 對焦/曝光（部分 iOS 支援）
      const track = video.srcObject && video.srcObject.getVideoTracks
        ? video.srcObject.getVideoTracks()[0]
        : null;
      if (track && track.applyConstraints) {
        track.applyConstraints({
          advanced: [
            { focusMode: 'continuous' },
            { exposureMode: 'continuous' },
            { whiteBalanceMode: 'continuous' }
          ]
        }).catch(() => {});
      }
    } catch (e) {
      codeReader = null;
      btnStart.disabled = false;
      if (silent) return;  // 自動啟動失敗:不顯示錯誤,讓使用者手動點按鈕
      if (e && e.name === 'NotAllowedError') {
        setStatus('', '相機權限被拒絕，請到 Safari 設定中允許相機');
      } else {
        setStatus('', `無法開啟相機：${(e && e.message) || e}`);
      }
      return;
    }

    running = true;
    btnStart.style.display = 'none';
    btnStop.style.display  = 'block';
    setStatus('scanning', '掃描中，將鏡頭對準條碼…');
  }

  async function stopScanner() {
    running = false;
    if (controls) { try { controls.stop(); } catch (_) {} controls = null; }
    codeReader = null;
    video.srcObject = null;
    btnStop.style.display  = 'none';
    btnStart.style.display = '';
    btnStart.disabled = false;
    setStatus('', '已停止掃描');
  }

  function clearAll() {
    resultValue.textContent = '—';
    resultCard.className = 'result-card';
    resultCard.onclick = null;
    rejectedDiv.innerHTML = '';
    rejectedSet.clear();
    rejectedList.hidden = true;
    rejectedList.classList.remove('open');
    rejectedCount.textContent = '(0)';
    lastFound = '';
    cooldown = false;
    pendingCode = '';
    pendingHits = 0;
    if (running) setStatus('scanning', '掃描中，將鏡頭對準條碼…');
  }

  btnStart.addEventListener('click', () => startScanner(false));
  btnStop.addEventListener('click', stopScanner);
  btnClear.addEventListener('click', clearAll);
  btnClearHistory.addEventListener('click', () => {
    if (confirm('確定要清空全部掃描歷史?')) clearHistory();
  });
  rejectedHeader.addEventListener('click', () => rejectedList.classList.toggle('open'));

  // 開頁就 render 一次歷史(從 localStorage 拉)
  renderHistory();

  // 嘗試載入後自動啟動相機。
  // iOS Safari 因安全規範禁止無使用者手勢的 getUserMedia,會靜默失敗,
  // 使用者改按「開始掃描」即可;桌面 Chrome / Android Chrome 通常會直接開啟。
  window.addEventListener('load', () => { startScanner(true); });
</script>
</body>
</html>
